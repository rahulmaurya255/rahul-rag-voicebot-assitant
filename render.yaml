services:
  - type: web
    name: mike-voice-assistant
    runtime: docker
    plan: free
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_COLLECTION
        value: rahul_knowledge
      - key: EMBEDDING_MODEL
        value: BAAI/bge-small-en-v1.5
      - key: EMBEDDING_DIM
        value: "384"
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: GROQ_MAX_TOKENS
        value: "512"
      - key: TTS_VOICE
        value: en-IN-PrabhatNeural
      - key: RAG_TOP_K
        value: "5"
      - key: RAG_SCORE_THRESHOLD
        value: "0.3"
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: "*"
