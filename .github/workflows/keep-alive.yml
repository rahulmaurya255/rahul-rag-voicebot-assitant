name: Keep Render Alive

on:
  schedule:
    # Every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render
        run: |
          curl -sf --max-time 30 https://rag-ai-voicebot.onrender.com/api/health || echo "Service waking up..."
